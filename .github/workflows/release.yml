name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: web/go.mod
          cache-dependency-path: web/go.sum

      - name: Prepare script asset
        run: chmod +x realm.sh

      - name: Build amd64
        working-directory: web
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o realm_web .
          zip ../realm-panel-linux-amd64.zip \
            realm_web config.toml \
            -r static templates

      - name: Build arm64
        working-directory: web
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" -o realm_web .
          zip ../realm-panel-linux-arm64.zip \
            realm_web config.toml \
            -r static templates

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            realm.sh
            realm-panel-linux-amd64.zip
            realm-panel-linux-arm64.zip
          generate_release_notes: true
